<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- GitHubのダークテーマ背景色 -->
  <rect width="128" height="128" rx="28" fill="#24292E" />
  
  <!-- Four Keysを表現する4色のグラフ（GitHubカラー） -->
  <rect x="26" y="64" width="12" height="32" rx="4" fill="#28A745" /> <!-- 緑 (Issue Open等) -->
  <rect x="46" y="48" width="12" height="48" rx="4" fill="#0366D6" /> <!-- 青 (リンク・主要アクション) -->
  <rect x="66" y="32" width="12" height="64" rx="4" fill="#6F42C1" /> <!-- 紫 (マージ済みPR等) -->
  <rect x="86" y="56" width="12" height="40" rx="4" fill="#D73A49" /> <!-- 赤 (Close済み・削除等) -->
  
  <!-- 「Sight（視認・分析）」を意味するルーペ・目のモチーフ -->
  <circle cx="64" cy="56" r="32" fill="none" stroke="#FAFBFC" stroke-width="8" />
  <line x1="86" y1="78" x2="104" y2="96" stroke="#FAFBFC" stroke-width="8" stroke-linecap="round" />

  <!-- DEVバッジ (右下) -->
  <g transform="translate(58, 86)">
    <rect width="60" height="32" rx="8" fill="#6BCB77"/>
    <text x="30" y="16" fill="white" font-size="15" font-weight="bold" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle" dominant-baseline="central">DEV</text>
  </g>
</svg>
